meta:
  id: byod-cps-it-triage
  title: "Trainer Demo Deploy — BYOD Copilot Studio scaffold"
  agent: orchestrator
  model: "Claude Opus 4.7"
  context: "BYOD Copilot Studio — MS-4006"
  task:
    label: "Build BYOD Copilot Studio agent for MS-4006"
    progress: [14, 14]
  diff:
    files:   14
    added:   312
    removed: 0
  mode: player
  loop: true
  startDelay: 600
