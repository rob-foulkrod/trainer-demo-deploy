name: v1 CI (PR)

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: v1-ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Test and Build (PR)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: Install
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build website
        run: npm run build
