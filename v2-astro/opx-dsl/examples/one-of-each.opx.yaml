meta:
  id: one-of-each
  title: "One of each step kind"
  agent: orchestrator
  model: "Claude Opus 4.7"
  context: "Schema smoke-test fixture"
  task:
    label: "Exercise every step kind"
    progress: [3, 3]
  diff:
    files:   3
    added:   30
    removed: 5
  mode: player
  loop: true
  startDelay: 400
  loopPause: 2200

steps:
  - user:
      handle: tester
      avatar:
        initials: te
        gradient: ["#0078D4", "#8661C5"]
      body: |
        @workspace Exercise every step kind in one script.
    timing: { typing: 2400, holdFor: 1600 }

  - agent:
      body: |
        I'll search the catalog, then create some files and report back.
      code:
        lang: bash
        source: |
          # quick check
          ls -la
    timing: { appearAfter: 300, typing: 600, holdFor: 2600 }

  - tool:
      kind: search
      title: "searched template catalog"
      detail: 'looking for `aca` templates'
      result: "Found 1 match"
    timing: { appearAfter: 250, holdFor: 1700 }

  - files:
      - { path: "infra/main.bicep", op: add,    lines: 20 }
      - { path: "src/index.ts",     op: edit,   lines: 10 }
      - { path: "old/legacy.cs",    op: delete, lines: 5  }
    timing:   { appearAfter: 250, holdFor: 1800 }
    advances: { task: 3, files: 3, added: 30, removed: 5 }

  - summary:
      title: "Generated 3 files"
      lead: "Includes:"
      bullets:
        - "Infra (Bicep)"
        - "App (TS)"
        - "Legacy cleanup"
    timing: { appearAfter: 300, holdFor: 2200 }

  - status:
      kind: done
      text: "Agent finished · 3 files · 1 search · 0 errors"
    timing: { appearAfter: 200, holdFor: 2000 }
